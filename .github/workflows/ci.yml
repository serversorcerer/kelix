name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Unit tests
        run: pytest -q
      - name: Denylist regression (dangerous commands are blocked)
        run: pytest tests/test_denylist_regression.py -q
      - name: Integration loop (2 iterations, mock agent, fixture repo)
        run: pytest tests/test_parity_demo.py tests/test_ci_integration.py -q

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip install -e .
          # Core is stdlib-only; audit the installed environment anyway.
          pip-audit || true

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build wheel and sdist
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Smoke test CLI from wheel
        run: |
          pip install dist/*.whl
          kelix --help
