# Publish Kelix to PyPI when a version tag is pushed (e.g. v0.1.0).
#
# One-time owner setup (see docs/publishing.md):
# 1. PyPI trusted publisher: owner=serversorcerer, repo=kelix,
#    workflow=publish.yml, environment=pypi
# 2. GitHub repository environment "pypi" (Settings → Environments)
# 3. git tag vX.Y.Z && git push origin vX.Y.Z
#
# Uses OIDC trusted publishing — no long-lived PyPI API token in secrets.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kelix
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Smoke test wheel
        run: |
          pip install dist/*.whl
          kelix --help
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
